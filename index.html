<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILATEN GUATEMALA  </title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a1a1a; --border: #eeeeee; --bg: #ffffff; 
            --sidebar: #fcfcfc; --text: #1a1a1a; --accent: #8d7b6d;
        }
        [data-theme="dark"] {
            --primary: #ffffff; --border: #333333; --bg: #121212; 
            --sidebar: #1a1a1a; --text: #f1f1f1; --accent: #b5a496;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.2s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* MENÚ DESPLEGABLE */
        aside { 
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; 
            height: 100vh; z-index: 1000; left: 0; transition: transform 0.4s ease;
        }
        aside.closed { transform: translateX(-260px); }
        
        main { flex: 1; margin-left: 260px; padding: 60px 40px; transition: margin-left 0.4s; }
        main.full { margin-left: 0; }

        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: var(--primary); color: var(--bg); border: none;
            padding: 12px; cursor: pointer; border-radius: 4px; display: flex; flex-direction: column; gap: 4px;
        }
        .menu-toggle span { width: 20px; height: 2px; background: currentColor; display: block; }

        #login-admin { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .nav-item { padding: 15px; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text); opacity: 0.6; }
        .nav-item.active { opacity: 1; font-weight: bold; border-left: 3px solid var(--accent); }

        .card { background: var(--bg); padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; border-radius: 8px; }
        .btn { padding: 12px 20px; background: var(--primary); color: var(--bg); border: none; cursor: pointer; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; font-weight: bold; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }
        
        .section { display: none; }
        .section.active { display: block; }

        .tab-sub { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-sub button { flex: 1; padding: 10px; font-size: 0.6rem; letter-spacing: 1px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); opacity: 0.6; }
        .tab-sub button.active { opacity: 1; border-color: var(--accent); background: var(--accent); color: white; }
    </style>
</head>
<body data-theme="light">

    <button class="menu-toggle" onclick="app.toggleMenu()">
        <span></span><span></span><span></span>
    </button>

    <div id="login-admin">
        <h1 style="font-family: 'Cormorant Garamond'; letter-spacing: 10px;">ACCESO ADMIN</h1>
        <input type="password" id="pass" placeholder="PIN DE ACCESO" style="width: 250px; text-align: center;">
        <button class="btn" style="margin-top: 2rem;" onclick="app.login()">Entrar</button>
    </div>

    <aside id="sidebar">
        <div style="margin-bottom: 40px; text-align: center; padding-top: 40px;">
            <h2 style="font-family: 'Cormorant Garamond'; letter-spacing: 5px;">LUMINA</h2>
        </div>
        <div class="nav-item active" onclick="app.setTab('pedidos', this)">Pedidos Activos</div>
        <div class="nav-item" onclick="app.setTab('historial', this)">Papelera</div>
        <div class="nav-item" onclick="app.setTab('inventario', this)">Inventario</div>
        <div class="nav-item" onclick="app.setTab('mejoras', this)">Mejoras</div>
        
        <div style="margin-top: auto; padding: 20px 0;">
            <div class="nav-item" onclick="app.toggleTheme()" style="opacity: 1; font-size: 0.6rem;">🌓 CAMBIAR MODO</div>
            <div class="nav-item" onclick="location.reload()" style="color:red; opacity: 1;">CERRAR SESIÓN</div>
        </div>
    </aside>

    <main id="main-content">
        <section id="tab-pedidos" class="section active">
            <h2>Pedidos en Curso</h2>
            <div id="list-pedidos" style="margin-top:20px;"></div>
        </section>

        <section id="tab-historial" class="section">
            <h2>Papelera / Historial</h2>
            <div id="list-historial" style="margin-top:20px;"></div>
        </section>

        <section id="tab-inventario" class="section">
            <h2>Gestión de Inventario</h2>
            
            <div class="tab-sub">
                <button id="btn-indiv" class="active" onclick="app.setInvMode('indiv')">Individual</button>
                <button id="btn-mass" onclick="app.setInvMode('mass')">Carga Masiva</button>
            </div>

            <div id="inv-indiv" class="card">
                <h4>Agregar un solo producto</h4>
                <input type="text" id="p_name" placeholder="Nombre del producto">
                <input type="number" id="p_price" placeholder="Precio (Q)">
                <textarea id="p_desc" placeholder="Descripción y tipo de piel recomendada"></textarea>
                <button class="btn" onclick="app.addProd()">Guardar Producto</button>
            </div>

            <div id="inv-mass" class="card" style="display:none;">
                <h4>Carga Masiva (CSV / Lista)</h4>
                <p style="font-size: 0.6rem; color: gray; margin-bottom: 10px;">Formato: Nombre, Precio, Descripción (Uno por línea)</p>
                <textarea id="p_mass_area" style="height: 150px;" placeholder="Serum Vitamina C, 150, Piel seca y opaca&#10;Limpiador Foam, 120, Piel grasa"></textarea>
                <button class="btn" onclick="app.addMassive()">Subir Lista Completa</button>
            </div>

            <div id="list-inventory"></div>
        </section>

        <section id="tab-mejoras" class="section">
            <h2>Sugerencias de Clientes</h2>
            <div id="list-feedback" style="margin-top:20px;"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        window.app = {
            login() { 
                if(document.getElementById('pass').value === '1234') {
                    document.getElementById('login-admin').style.display='none';
                    this.init();
                } else alert("PIN Incorrecto");
            },

            toggleMenu() {
                document.getElementById('sidebar').classList.toggle('closed');
                document.getElementById('main-content').classList.toggle('full');
            },

            toggleTheme() {
                const b = document.body;
                b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
            },

            setTab(t, el) {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('tab-'+t).classList.add('active');
                el.classList.add('active');
            },

            setInvMode(mode) {
                document.getElementById('inv-indiv').style.display = mode === 'indiv' ? 'block' : 'none';
                document.getElementById('inv-mass').style.display = mode === 'mass' ? 'block' : 'none';
                document.getElementById('btn-indiv').classList.toggle('active', mode === 'indiv');
                document.getElementById('btn-mass').classList.toggle('active', mode === 'mass');
            },

            init() {
                onSnapshot(collection(db, "pedidos"), (snap) => {
                    const listP = document.getElementById('list-pedidos'), listH = document.getElementById('list-historial'), listF = document.getElementById('list-feedback');
                    listP.innerHTML = ''; listH.innerHTML = ''; listF.innerHTML = '';

                    snap.docs.forEach(d => {
                        const o = d.data();
                        const h = `
                            <div class="card">
                                <strong>${o.name} (${o.trackingID})</strong>
                                <select onchange="app.updateStatus('${d.id}', this.value)" style="margin-top:10px;">
                                    <option value="pendiente" ${o.status==='pendiente'?'selected':''}>Pendiente</option>
                                    <option value="proceso" ${o.status==='proceso'?'selected':''}>Proceso</option>
                                    <option value="enviado" ${o.status==='enviado'?'selected':''}>Enviado</option>
                                    <option value="entregado" ${o.status==='entregado'?'selected':''}>Entregado</option>
                                    <option value="papelera" ${o.status==='papelera'?'selected':''}>Papelera</option>
                                </select>
                                ${o.status==='papelera' ? `<button class="btn" style="background:red" onclick="app.hardDelete('${d.id}')">Borrar Definitivo</button>` : ''}
                            </div>`;
                        if(o.status === 'papelera') listH.innerHTML += h; else listP.innerHTML += h;
                        if(o.rating > 0) listF.innerHTML += `<div class="card"><div style="color:gold">${'★'.repeat(o.rating)}</div><p>${o.feedback}</p></div>`;
                    });
                });

                onSnapshot(collection(db, "productos"), (snap) => {
                    document.getElementById('list-inventory').innerHTML = snap.docs.map(d => `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <span>${d.data().name} - Q${d.data().price}</span>
                            <button onclick="app.delProd('${d.id}')" style="color:red; background:none; border:none; cursor:pointer;">Eliminar</button>
                        </div>`).join('');
                });
            },

            async updateStatus(id, s) { await updateDoc(doc(db, "pedidos", id), { status: s }); },
            async delProd(id) { if(confirm("¿Eliminar producto?")) await deleteDoc(doc(db, "productos", id)); },
            async hardDelete(id) { if(confirm("¿Borrar permanentemente?")) await deleteDoc(doc(db, "pedidos", id)); },
            
            async addProd() {
                const name = document.getElementById('p_name').value;
                const price = parseFloat(document.getElementById('p_price').value);
                const description = document.getElementById('p_desc').value;
                if(name && price) {
                    await addDoc(collection(db, "productos"), { name, price, description });
                    document.getElementById('p_name').value = ''; document.getElementById('p_price').value = ''; document.getElementById('p_desc').value = '';
                }
            },

            async addMassive() {
                const text = document.getElementById('p_mass_area').value;
                const lines = text.split('\n');
                let count = 0;
                for(let line of lines) {
                    const [n, p, d] = line.split(',');
                    if(n && p) {
                        await addDoc(collection(db, "productos"), { name: n.trim(), price: parseFloat(p.trim()), description: d ? d.trim() : "" });
                        count++;
                    }
                }
                alert(`${count} productos agregados exitosamente.`);
                document.getElementById('p_mass_area').value = '';
            }
        };
    </script>
</body>
</html>
