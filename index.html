<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA — Panel de Asesor</title>
    <style>
        :root { --primary: #1a1a1a; --border: #e9ecef; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; background: #f8f9fa; }
        
        /* --- SIDEBAR RESPONSIVO --- */
        aside { width: 240px; background: white; border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; }
        main { flex: 1; padding: 20px; overflow-x: hidden; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); display: flex; gap: 10px; overflow-x: auto; }
            main { padding: 15px; }
        }

        .nav-link { padding: 12px; cursor: pointer; border-radius: 6px; font-size: 0.85rem; white-space: nowrap; }
        .nav-link.active { background: var(--primary); color: white; }

        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

    <aside>
        <div class="nav-link active" onclick="app.setView('pedidos', this)">Pedidos</div>
        <div class="nav-link" onclick="app.setView('productos', this)">Inventario</div>
        <div class="nav-link" onclick="app.setView('mejoras', this)">Feedback</div>
        <div class="nav-link" onclick="location.reload()">Salir</div>
    </aside>

    <main>
        <section id="view-pedidos" class="view-section active">
            <h1>Pedidos Recientes</h1>
            <div id="list-pedidos" style="margin-top:20px;"></div>
        </section>

        <section id="view-productos" class="view-section">
            <h1>Gestión de Catálogo</h1>
            <div class="card" style="max-width: 500px;">
                <input type="text" id="p_name" placeholder="Nombre del producto">
                <input type="number" id="p_price" placeholder="Precio (Q)">
                <textarea id="p_desc" placeholder="Descripción (Incluya 'seca', 'grasa' o 'mixta' para asesoría)"></textarea>
                <button onclick="app.addProduct()" style="width:100%; padding:10px; background:var(--success); color:white; border:none;">Guardar</button>
            </div>
            <table style="background:white;">
                <thead><tr><th>Nombre</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody id="table-productos"></tbody>
            </table>
        </section>

        <section id="view-mejoras" class="view-section">
            <h1>Sugerencias de Clientes</h1>
            <div id="list-mejoras"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        window.app = {
            setView(id, el) {
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById('view-'+id).classList.add('active');
                el.classList.add('active');
            },

            async addProduct() {
                const name = document.getElementById('p_name').value;
                const price = parseFloat(document.getElementById('p_price').value);
                const description = document.getElementById('p_desc').value;
                if(name && price) {
                    await addDoc(collection(db, "productos"), { name, price, description });
                    document.getElementById('p_name').value = ''; document.getElementById('p_price').value = ''; document.getElementById('p_desc').value = '';
                }
            },

            async deleteProduct(id) {
                if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "productos", id));
            }
        };

        onSnapshot(collection(db, "productos"), (snap) => {
            const tbody = document.getElementById('table-productos');
            tbody.innerHTML = snap.docs.map(d => `
                <tr>
                    <td>${d.data().name}</td>
                    <td>Q${d.data().price}</td>
                    <td><button onclick="app.deleteProduct('${d.id}')" style="color:red; background:none; border:none;">X</button></td>
                </tr>`).join('');
        });

        onSnapshot(collection(db, "pedidos"), (snap) => {
            const list = document.getElementById('list-pedidos');
            const mejoras = document.getElementById('list-mejoras');
            
            list.innerHTML = snap.docs.filter(d => d.data().status === 'pendiente').map(d => `
                <div class="card">
                    <strong>${d.data().name}</strong><br>
                    <small>${d.data().addr}</small><br>
                    <strong>Total: Q${d.data().total}</strong>
                    <button onclick="updateDoc(doc(db,'pedidos','${d.id}'),{status:'ok'})" style="margin-top:10px; display:block; padding:5px;">Atender</button>
                </div>`).join('');

            // Aquí se verían las mejoras/estrellas si se guardan en el mismo pedido o colección aparte
            // Por simplicidad, este panel está listo para recibir esa info.
        });
    </script>
</body>
</html>
