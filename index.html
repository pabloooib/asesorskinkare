<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA — Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --border: #e9ecef; --success: #10b981; --bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); min-height: 100vh; }
        
        /* --- LOGIN CONTROL --- */
        #login-admin { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; text-align: center; }

        #dashboard { display: none; flex-direction: row; min-height: 100vh; }
        aside { width: 260px; background: white; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        main { flex: 1; padding: 40px; overflow-y: auto; }

        @media (max-width: 768px) {
            #dashboard { flex-direction: column; }
            aside { width: 100%; border-bottom: 1px solid var(--border); padding: 15px; flex-direction: row; overflow-x: auto; }
        }

        .nav-link { padding: 12px 15px; cursor: pointer; border-radius: 8px; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; white-space: nowrap; }
        .nav-link.active { background: var(--primary); color: white; }
        .nav-link:hover { background: #f1f5f9; }

        .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="login-admin">
        <div class="login-card">
            <h1 style="font-family: serif; font-size: 2rem; margin-bottom: 2rem;">Asesor Lumina</h1>
            <input type="password" id="admin_pass" placeholder="Código de Acceso">
            <button class="btn-main" onclick="app.login()">Entrar al Panel</button>
        </div>
    </div>

    <div id="dashboard">
        <aside>
            <h2 style="font-family: serif; margin-bottom: 2rem; text-align:center;">Lumina</h2>
            <div class="nav-link active" onclick="app.setView('pedidos', this)">Pedidos</div>
            <div class="nav-link" onclick="app.setView('productos', this)">Productos</div>
            <div class="nav-link" onclick="app.setView('mejoras', this)">Feedback</div>
            <div class="nav-link" style="margin-top:auto; color: #ef4444;" onclick="app.logout()">Cerrar Sesión</div>
        </aside>

        <main>
            <section id="view-pedidos" class="view-section active">
                <h1>Pedidos Entrantes</h1>
                <div id="list-pedidos" style="margin-top:20px;"></div>
            </section>

            <section id="view-productos" class="view-section">
                <h1>Catálogo Digital</h1>
                <div class="card" style="max-width: 450px;">
                    <h3>Nuevo Item</h3>
                    <input type="text" id="p_name" placeholder="Nombre">
                    <input type="number" id="p_price" placeholder="Precio (Q)">
                    <textarea id="p_desc" placeholder="Descripción del producto"></textarea>
                    <button class="btn-main" onclick="app.addProduct()" style="background:var(--success);">Sincronizar</button>
                </div>
                <table>
                    <thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                    <tbody id="table-productos"></tbody>
                </table>
            </section>

            <section id="view-mejoras" class="view-section">
                <h1>Experiencia del Cliente</h1>
                <div id="list-mejoras" style="margin-top:20px;"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        window.app = {
            login() {
                const pass = document.getElementById('admin_pass').value;
                if(pass === '1234') { // Cambia aquí tu contraseña
                    document.getElementById('login-admin').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    this.initListeners();
                } else { alert("Acceso denegado"); }
            },

            logout() {
                if(confirm("¿Cerrar sesión?")) location.reload();
            },

            setView(id, el) {
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById('view-'+id).classList.add('active');
                el.classList.add('active');
            },

            initListeners() {
                onSnapshot(collection(db, "productos"), (snap) => {
                    document.getElementById('table-productos').innerHTML = snap.docs.map(d => `
                        <tr>
                            <td>${d.data().name}</td>
                            <td>Q${d.data().price}</td>
                            <td><button onclick="app.deleteProd('${d.id}')" style="color:red; border:none; background:none; cursor:pointer;">Eliminar</button></td>
                        </tr>`).join('');
                });

                onSnapshot(collection(db, "pedidos"), (snap) => {
                    const list = document.getElementById('list-pedidos');
                    const mejoras = document.getElementById('list-mejoras');
                    list.innerHTML = snap.docs.filter(d => d.data().status === 'pendiente').map(d => `
                        <div class="card">
                            <strong>${d.data().name}</strong><br>
                            <small>${d.data().addr}</small><hr style="margin:10px 0; opacity:0.1;">
                            <p>${d.data().items.map(i => i.name).join(', ')}</p>
                            <button onclick="app.complete('${d.id}')" style="margin-top:10px; padding:5px 10px;">Atendido</button>
                        </div>`).join('');
                });
            },

            async addProduct() {
                const name = document.getElementById('p_name').value;
                const price = parseFloat(document.getElementById('p_price').value);
                const description = document.getElementById('p_desc').value;
                if(name && price) {
                    await addDoc(collection(db, "productos"), { name, price, description });
                    document.getElementById('p_name').value = ''; document.getElementById('p_price').value = ''; document.getElementById('p_desc').value = '';
                }
            },

            async deleteProd(id) { await deleteDoc(doc(db, "productos", id)); },
            async complete(id) { await updateDoc(doc(db, "pedidos", id), { status: 'ok' }); }
        };
    </script>
</body>
</html>
